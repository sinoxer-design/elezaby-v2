<svg xmlns="http://www.w3.org/2000/svg" width="400" height="400" viewBox="0 0 400 400" fill="none">
  <rect width="400" height="400" rx="16" fill="#F0E6FF"/>
  <defs>
    <linearGradient id="shampGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#7E22CE"/>
      <stop offset="35%" stop-color="#9333EA"/>
      <stop offset="100%" stop-color="#6B21A8"/>
    </linearGradient>
    <linearGradient id="shampCap" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#A855F7"/>
      <stop offset="100%" stop-color="#7E22CE"/>
    </linearGradient>
    <filter id="shampSh" x="-5%" y="-5%" width="115%" height="115%">
      <feDropShadow dx="0" dy="6" stdDeviation="10" flood-color="#581C87" flood-opacity="0.2"/>
    </filter>
  </defs>
  <g filter="url(#shampSh)">
    <!-- Bottle body - curved elegant shape -->
    <path d="M150,150 Q130,170 125,220 L125,310 Q125,350 165,350 L235,350 Q275,350 275,310 L275,220 Q270,170 250,150 Z" fill="url(#shampGrad)"/>
    <!-- Body shine -->
    <path d="M142,165 Q132,185 130,230 L130,300 Q130,325 145,335 L140,180 Z" fill="white" opacity="0.15"/>
    <!-- Neck -->
    <rect x="172" y="115" width="56" height="40" rx="4" fill="#9333EA"/>
    <!-- Flip cap -->
    <path d="M165,85 L235,85 Q242,85 242,92 L242,120 Q242,125 235,125 L165,125 Q158,125 158,120 L158,92 Q158,85 165,85 Z" fill="url(#shampCap)"/>
    <!-- Cap hinge line -->
    <line x1="160" y1="105" x2="240" y2="105" stroke="#6B21A8" stroke-width="1.5" opacity="0.4"/>
    <!-- Cap highlight -->
    <rect x="168" y="90" width="40" height="6" rx="3" fill="white" opacity="0.2"/>
    <!-- Label -->
    <rect x="145" y="200" width="110" height="100" rx="12" fill="white" opacity="0.12"/>
    <rect x="162" y="222" width="76" height="10" rx="3" fill="white" opacity="0.28"/>
    <rect x="170" y="240" width="60" height="7" rx="2" fill="white" opacity="0.18"/>
    <rect x="175" y="254" width="50" height="6" rx="2" fill="white" opacity="0.12"/>
    <!-- Water drop icon -->
    <path d="M200,275 Q194,286 194,292 Q194,300 200,302 Q206,300 206,292 Q206,286 200,275 Z" fill="white" opacity="0.18"/>
  </g>
</svg>
