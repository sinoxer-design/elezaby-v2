<svg xmlns="http://www.w3.org/2000/svg" width="400" height="400" viewBox="0 0 400 400" fill="none">
  <rect width="400" height="400" rx="16" fill="#E8FFF5"/>
  <defs>
    <linearGradient id="tubeGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#10B981"/>
      <stop offset="50%" stop-color="#34D399"/>
      <stop offset="100%" stop-color="#10B981"/>
    </linearGradient>
    <linearGradient id="tubeCap" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#059669"/>
      <stop offset="100%" stop-color="#047857"/>
    </linearGradient>
    <filter id="tubeSh" x="-5%" y="-5%" width="115%" height="120%">
      <feDropShadow dx="0" dy="6" stdDeviation="10" flood-color="#059669" flood-opacity="0.18"/>
    </filter>
  </defs>
  <g filter="url(#tubeSh)">
    <!-- Tube body -->
    <path d="M140,120 L260,120 Q270,120 270,130 L270,310 Q270,340 240,340 L160,340 Q130,340 130,310 L130,130 Q130,120 140,120 Z" fill="url(#tubeGrad)"/>
    <!-- Tube crimp at bottom -->
    <rect x="155" y="330" width="90" height="12" rx="3" fill="#047857"/>
    <!-- Cap -->
    <path d="M170,120 L170,80 Q170,65 185,65 L215,65 Q230,65 230,80 L230,120 Z" fill="url(#tubeCap)"/>
    <rect x="175" y="65" width="12" height="55" rx="2" fill="white" opacity="0.15"/>
    <!-- Nozzle -->
    <rect x="185" y="55" width="30" height="16" rx="8" fill="#047857"/>
    <!-- Body shine -->
    <rect x="140" y="125" width="25" height="200" rx="8" fill="white" opacity="0.2"/>
    <!-- Label -->
    <rect x="150" y="160" width="100" height="100" rx="10" fill="white" opacity="0.15"/>
    <rect x="165" y="180" width="70" height="10" rx="3" fill="white" opacity="0.3"/>
    <rect x="170" y="198" width="60" height="7" rx="2" fill="white" opacity="0.2"/>
    <rect x="175" y="213" width="50" height="7" rx="2" fill="white" opacity="0.15"/>
    <!-- Fold lines at bottom -->
    <line x1="130" y1="315" x2="270" y2="315" stroke="#047857" stroke-width="1" opacity="0.3"/>
    <line x1="132" y1="322" x2="268" y2="322" stroke="#047857" stroke-width="1" opacity="0.2"/>
  </g>
</svg>
