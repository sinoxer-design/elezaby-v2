<svg xmlns="http://www.w3.org/2000/svg" width="400" height="400" viewBox="0 0 400 400" fill="none">
  <rect width="400" height="400" rx="16" fill="#E0F7FA"/>
  <defs>
    <linearGradient id="tpGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#0891B2"/>
      <stop offset="40%" stop-color="#22D3EE"/>
      <stop offset="100%" stop-color="#0891B2"/>
    </linearGradient>
    <linearGradient id="tpCap" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#F0FDFA"/>
      <stop offset="100%" stop-color="#CCFBF1"/>
    </linearGradient>
    <linearGradient id="tpStripe" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#E11D48" opacity="0.6"/>
      <stop offset="100%" stop-color="#E11D48" opacity="0.4"/>
    </linearGradient>
    <filter id="tpSh" x="-5%" y="-5%" width="115%" height="115%">
      <feDropShadow dx="0" dy="6" stdDeviation="10" flood-color="#0E7490" flood-opacity="0.2"/>
    </filter>
  </defs>
  <g filter="url(#tpSh)">
    <!-- Tube body - horizontal, slightly angled -->
    <g transform="translate(200,210) rotate(-8)">
      <!-- Main tube -->
      <rect x="-130" y="-40" width="240" height="80" rx="12" fill="url(#tpGrad)"/>
      <!-- Crimp at end -->
      <rect x="-135" y="-30" width="12" height="60" rx="3" fill="#0E7490"/>
      <line x1="-132" y1="-20" x2="-132" y2="20" stroke="#06B6D4" stroke-width="1" opacity="0.3"/>
      <!-- Stripe -->
      <rect x="-120" y="8" width="220" height="14" rx="4" fill="url(#tpStripe)"/>
      <!-- Shine -->
      <rect x="-115" y="-35" width="200" height="12" rx="4" fill="white" opacity="0.18"/>
      <!-- Nozzle/opening area -->
      <path d="M110,-30 L130,-20 L130,20 L110,30 Z" fill="#06B6D4"/>
      <!-- Cap -->
      <rect x="128" y="-36" width="50" height="72" rx="14" fill="url(#tpCap)" stroke="#99F6E4" stroke-width="1"/>
      <rect x="136" y="-28" width="8" height="56" rx="3" fill="white" opacity="0.2"/>
      <!-- Label text -->
      <rect x="-80" y="-18" width="100" height="10" rx="3" fill="white" opacity="0.3"/>
      <rect x="-65" y="-2" width="70" height="7" rx="2" fill="white" opacity="0.2"/>
      <!-- Sparkle icon -->
      <path d="M-30,28 L-26,22 L-22,28 L-26,34 Z" fill="white" opacity="0.2"/>
    </g>
  </g>
</svg>
