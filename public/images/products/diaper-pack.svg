<svg xmlns="http://www.w3.org/2000/svg" width="400" height="400" viewBox="0 0 400 400" fill="none">
  <rect width="400" height="400" rx="16" fill="#FFF8E1"/>
  <defs>
    <linearGradient id="diaperGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FBBF24"/>
      <stop offset="100%" stop-color="#F59E0B"/>
    </linearGradient>
    <filter id="diaperSh" x="-5%" y="-5%" width="115%" height="115%">
      <feDropShadow dx="0" dy="6" stdDeviation="10" flood-color="#D97706" flood-opacity="0.18"/>
    </filter>
  </defs>
  <g filter="url(#diaperSh)">
    <!-- Pack body - puffy bag shape -->
    <path d="M90,140 Q85,130 100,120 L300,120 Q315,130 310,140 L320,310 Q325,345 290,350 L110,350 Q75,345 80,310 Z" fill="url(#diaperGrad)"/>
    <!-- Pack puffiness highlights -->
    <path d="M100,130 Q95,180 105,310 Q110,340 130,342 L110,350 Q80,345 85,310 L90,140 Z" fill="white" opacity="0.15"/>
    <!-- Crinkle lines on sides -->
    <path d="M95,160 Q90,200 88,240" stroke="#D97706" stroke-width="1.5" fill="none" opacity="0.2"/>
    <path d="M305,160 Q310,200 312,240" stroke="#D97706" stroke-width="1.5" fill="none" opacity="0.2"/>
    <!-- Handle/carry hole -->
    <ellipse cx="200" cy="105" rx="40" ry="14" fill="#FFF8E1"/>
    <ellipse cx="200" cy="105" rx="40" ry="14" fill="none" stroke="#E5A000" stroke-width="3"/>
    <!-- Label area -->
    <rect x="130" y="170" width="140" height="120" rx="14" fill="white" opacity="0.2"/>
    <!-- Baby icon silhouette -->
    <circle cx="200" cy="210" r="18" fill="white" opacity="0.25"/>
    <ellipse cx="200" cy="248" rx="24" ry="16" fill="white" opacity="0.2"/>
    <!-- Text placeholders -->
    <rect x="155" y="280" width="90" height="8" rx="2" fill="white" opacity="0.3"/>
    <rect x="165" y="295" width="70" height="6" rx="2" fill="white" opacity="0.2"/>
    <!-- Stars decoration -->
    <circle cx="145" cy="185" r="4" fill="white" opacity="0.25"/>
    <circle cx="260" cy="192" r="3" fill="white" opacity="0.2"/>
    <circle cx="250" cy="178" r="5" fill="white" opacity="0.2"/>
  </g>
</svg>
