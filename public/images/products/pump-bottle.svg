<svg xmlns="http://www.w3.org/2000/svg" width="400" height="400" viewBox="0 0 400 400" fill="none">
  <rect width="400" height="400" rx="16" fill="#F3E8FF"/>
  <defs>
    <linearGradient id="pumpGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#8B5CF6"/>
      <stop offset="40%" stop-color="#A78BFA"/>
      <stop offset="100%" stop-color="#7C3AED"/>
    </linearGradient>
    <linearGradient id="pumpHead" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#F5F5F5"/>
      <stop offset="100%" stop-color="#CFCFCF"/>
    </linearGradient>
    <filter id="pumpSh" x="-5%" y="-5%" width="115%" height="115%">
      <feDropShadow dx="0" dy="6" stdDeviation="10" flood-color="#7C3AED" flood-opacity="0.2"/>
    </filter>
  </defs>
  <g filter="url(#pumpSh)">
    <!-- Bottle body - tall and elegant -->
    <path d="M145,170 Q140,170 140,180 L140,320 Q140,350 170,350 L230,350 Q260,350 260,320 L260,180 Q260,170 255,170 Z" fill="url(#pumpGrad)"/>
    <!-- Body shine -->
    <path d="M152,175 Q150,175 150,182 L150,310 Q150,330 160,335 L158,175 Z" fill="white" opacity="0.2"/>
    <!-- Neck -->
    <rect x="180" y="140" width="40" height="35" rx="4" fill="#A78BFA"/>
    <!-- Collar -->
    <rect x="170" y="162" width="60" height="14" rx="7" fill="#6D28D9"/>
    <!-- Pump stem -->
    <rect x="195" y="80" width="10" height="65" rx="3" fill="#D4D4D4"/>
    <!-- Pump head (flat disc) -->
    <ellipse cx="200" cy="80" rx="35" ry="10" fill="url(#pumpHead)"/>
    <ellipse cx="200" cy="77" rx="35" ry="10" fill="#EBEBEB"/>
    <!-- Pump nozzle -->
    <rect x="230" y="72" width="22" height="8" rx="4" fill="#D4D4D4"/>
    <circle cx="252" cy="76" r="3" fill="#BEBEBE"/>
    <!-- Label -->
    <rect x="160" y="210" width="80" height="90" rx="8" fill="white" opacity="0.12"/>
    <rect x="172" y="230" width="56" height="8" rx="2" fill="white" opacity="0.25"/>
    <rect x="178" y="245" width="44" height="6" rx="2" fill="white" opacity="0.18"/>
    <rect x="182" y="258" width="36" height="6" rx="2" fill="white" opacity="0.12"/>
    <circle cx="200" cy="280" r="8" fill="white" opacity="0.1"/>
  </g>
</svg>
