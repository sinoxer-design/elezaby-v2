<svg xmlns="http://www.w3.org/2000/svg" width="400" height="400" viewBox="0 0 400 400" fill="none">
  <rect width="400" height="400" rx="16" fill="#ECFDF5"/>
  <defs>
    <linearGradient id="vitGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#16A34A"/>
      <stop offset="40%" stop-color="#22C55E"/>
      <stop offset="100%" stop-color="#15803D"/>
    </linearGradient>
    <linearGradient id="vitCap" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#F5F5F5"/>
      <stop offset="100%" stop-color="#D4D4D4"/>
    </linearGradient>
    <filter id="vitSh" x="-5%" y="-5%" width="115%" height="115%">
      <feDropShadow dx="0" dy="6" stdDeviation="10" flood-color="#15803D" flood-opacity="0.18"/>
    </filter>
  </defs>
  <g filter="url(#vitSh)">
    <!-- Bottle body - wide jar shape -->
    <path d="M130,160 Q125,160 125,172 L125,310 Q125,345 160,345 L240,345 Q275,345 275,310 L275,172 Q275,160 270,160 Z" fill="url(#vitGrad)"/>
    <!-- Body shine -->
    <rect x="137" y="165" width="20" height="165" rx="8" fill="white" opacity="0.18"/>
    <!-- Neck -->
    <rect x="165" y="130" width="70" height="35" rx="4" fill="#22C55E"/>
    <!-- Screw cap -->
    <rect x="155" y="100" width="90" height="36" rx="12" fill="url(#vitCap)"/>
    <!-- Cap ridges -->
    <line x1="160" y1="108" x2="160" y2="130" stroke="#BEBEBE" stroke-width="1" opacity="0.4"/>
    <line x1="170" y1="106" x2="170" y2="132" stroke="#BEBEBE" stroke-width="1" opacity="0.4"/>
    <line x1="180" y1="105" x2="180" y2="133" stroke="#BEBEBE" stroke-width="1" opacity="0.4"/>
    <line x1="190" y1="105" x2="190" y2="133" stroke="#BEBEBE" stroke-width="1" opacity="0.4"/>
    <line x1="200" y1="105" x2="200" y2="133" stroke="#BEBEBE" stroke-width="1" opacity="0.4"/>
    <line x1="210" y1="105" x2="210" y2="133" stroke="#BEBEBE" stroke-width="1" opacity="0.4"/>
    <line x1="220" y1="105" x2="220" y2="133" stroke="#BEBEBE" stroke-width="1" opacity="0.4"/>
    <line x1="230" y1="106" x2="230" y2="132" stroke="#BEBEBE" stroke-width="1" opacity="0.4"/>
    <line x1="240" y1="108" x2="240" y2="130" stroke="#BEBEBE" stroke-width="1" opacity="0.4"/>
    <!-- Label -->
    <rect x="142" y="190" width="116" height="110" rx="10" fill="white" opacity="0.15"/>
    <rect x="160" y="210" width="80" height="10" rx="3" fill="white" opacity="0.3"/>
    <rect x="168" y="228" width="64" height="7" rx="2" fill="white" opacity="0.2"/>
    <rect x="172" y="243" width="56" height="7" rx="2" fill="white" opacity="0.15"/>
    <!-- Leaf icon on label -->
    <path d="M195,270 Q200,255 212,260 Q210,275 200,278 Z" fill="white" opacity="0.2"/>
    <path d="M205,270 Q200,255 188,260 Q190,275 200,278 Z" fill="white" opacity="0.15"/>
  </g>
</svg>
