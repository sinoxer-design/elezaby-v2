<svg xmlns="http://www.w3.org/2000/svg" width="400" height="400" viewBox="0 0 400 400" fill="none">
  <rect width="400" height="400" rx="16" fill="#FFE4E8"/>
  <defs>
    <linearGradient id="serumGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#FDA4AF"/>
      <stop offset="40%" stop-color="#FBD5DA"/>
      <stop offset="100%" stop-color="#FDA4AF"/>
    </linearGradient>
    <linearGradient id="serumLiq" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FECDD3"/>
      <stop offset="100%" stop-color="#F43F5E"/>
    </linearGradient>
    <linearGradient id="dropperGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#F5F5F5"/>
      <stop offset="100%" stop-color="#D4D4D4"/>
    </linearGradient>
    <filter id="serumSh" x="-5%" y="-5%" width="115%" height="115%">
      <feDropShadow dx="0" dy="6" stdDeviation="10" flood-color="#E11D48" flood-opacity="0.15"/>
    </filter>
  </defs>
  <g filter="url(#serumSh)">
    <!-- Bottle body - tall slim -->
    <path d="M160,155 Q155,155 155,165 L155,320 Q155,350 180,350 L220,350 Q245,350 245,320 L245,165 Q245,155 240,155 Z" fill="url(#serumGrad)"/>
    <!-- Liquid inside (visible through bottle) -->
    <path d="M165,200 L165,315 Q165,340 185,340 L215,340 Q235,340 235,315 L235,200 Z" fill="url(#serumLiq)" opacity="0.3"/>
    <!-- Body shine -->
    <rect x="165" y="160" width="14" height="170" rx="5" fill="white" opacity="0.3"/>
    <!-- Neck -->
    <rect x="182" y="128" width="36" height="32" rx="4" fill="#FCA5B1"/>
    <!-- Dropper collar -->
    <rect x="172" y="118" width="56" height="16" rx="8" fill="url(#dropperGrad)"/>
    <!-- Rubber bulb -->
    <path d="M185,118 L185,80 Q185,60 200,60 Q215,60 215,80 L215,118 Z" fill="#E11D48" opacity="0.7"/>
    <path d="M190,115 L190,85 Q190,70 198,70 L198,115 Z" fill="white" opacity="0.15"/>
    <!-- Glass tube (inside bottle, visible) -->
    <rect x="196" y="130" width="8" height="140" rx="2" fill="#FCA5B1" opacity="0.4"/>
    <!-- Drop -->
    <ellipse cx="200" cy="290" rx="4" ry="5" fill="#F43F5E" opacity="0.4"/>
    <!-- Label -->
    <rect x="170" y="220" width="60" height="6" rx="2" fill="white" opacity="0.2"/>
    <rect x="176" y="232" width="48" height="5" rx="2" fill="white" opacity="0.15"/>
  </g>
</svg>
