<svg xmlns="http://www.w3.org/2000/svg" width="400" height="400" viewBox="0 0 400 400" fill="none">
  <rect width="400" height="400" rx="16" fill="#FFF0E6"/>
  <defs>
    <linearGradient id="bcGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#FB923C"/>
      <stop offset="40%" stop-color="#FDBA74"/>
      <stop offset="100%" stop-color="#F97316"/>
    </linearGradient>
    <linearGradient id="bcCap" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFFBF5"/>
      <stop offset="100%" stop-color="#FDE8D0"/>
    </linearGradient>
    <filter id="bcSh" x="-5%" y="-5%" width="115%" height="115%">
      <feDropShadow dx="0" dy="6" stdDeviation="10" flood-color="#C2410C" flood-opacity="0.18"/>
    </filter>
  </defs>
  <g filter="url(#bcSh)">
    <!-- Tube body - standing upright -->
    <path d="M148,140 L252,140 Q260,140 260,150 L260,320 Q260,350 235,350 L165,350 Q140,350 140,320 L140,150 Q140,140 148,140 Z" fill="url(#bcGrad)"/>
    <!-- Tube fold at bottom -->
    <rect x="155" y="340" width="90" height="14" rx="4" fill="#EA580C"/>
    <line x1="160" y1="347" x2="240" y2="347" stroke="#C2410C" stroke-width="1" opacity="0.3"/>
    <!-- Body shine -->
    <rect x="150" y="145" width="18" height="185" rx="6" fill="white" opacity="0.2"/>
    <!-- Cap -->
    <rect x="158" y="100" width="84" height="46" rx="16" fill="url(#bcCap)" stroke="#FDBA74" stroke-width="1"/>
    <!-- Cap flip line -->
    <line x1="162" y1="123" x2="238" y2="123" stroke="#E8C49A" stroke-width="1.5" opacity="0.5"/>
    <!-- Cap highlight -->
    <rect x="170" y="107" width="30" height="6" rx="3" fill="white" opacity="0.35"/>
    <!-- Label area -->
    <rect x="155" y="175" width="90" height="110" rx="10" fill="white" opacity="0.15"/>
    <!-- Star/baby icon -->
    <circle cx="200" cy="215" r="16" fill="white" opacity="0.2"/>
    <circle cx="200" cy="212" r="6" fill="white" opacity="0.15"/>
    <ellipse cx="200" cy="224" rx="10" ry="7" fill="white" opacity="0.12"/>
    <!-- Text -->
    <rect x="168" y="248" width="64" height="8" rx="2" fill="white" opacity="0.28"/>
    <rect x="175" y="262" width="50" height="6" rx="2" fill="white" opacity="0.18"/>
    <rect x="180" y="274" width="40" height="5" rx="2" fill="white" opacity="0.12"/>
  </g>
</svg>
