<svg xmlns="http://www.w3.org/2000/svg" width="400" height="400" viewBox="0 0 400 400" fill="none">
  <rect width="400" height="400" rx="16" fill="#E8F4FD"/>
  <defs>
    <linearGradient id="sprayGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#3B82F6"/>
      <stop offset="40%" stop-color="#60A5FA"/>
      <stop offset="100%" stop-color="#3B82F6"/>
    </linearGradient>
    <linearGradient id="sprayHead" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#F8F8F8"/>
      <stop offset="100%" stop-color="#D4D4D4"/>
    </linearGradient>
    <filter id="spraySh" x="-5%" y="-5%" width="115%" height="115%">
      <feDropShadow dx="0" dy="6" stdDeviation="10" flood-color="#1D4ED8" flood-opacity="0.18"/>
    </filter>
  </defs>
  <g filter="url(#spraySh)">
    <!-- Bottle body -->
    <path d="M155,160 L155,310 Q155,340 180,340 L220,340 Q245,340 245,310 L245,160 Z" fill="url(#sprayGrad)"/>
    <!-- Body shine -->
    <rect x="162" y="165" width="18" height="160" rx="6" fill="white" opacity="0.2"/>
    <!-- Neck -->
    <rect x="175" y="130" width="50" height="35" rx="4" fill="#93C5FD"/>
    <!-- Spray head base -->
    <rect x="168" y="105" width="64" height="30" rx="6" fill="url(#sprayHead)"/>
    <!-- Nozzle arm -->
    <rect x="230" y="95" width="45" height="14" rx="4" fill="#E5E5E5"/>
    <circle cx="275" cy="102" r="6" fill="#D4D4D4"/>
    <!-- Trigger -->
    <path d="M232,109 L250,109 L250,140 Q250,148 242,148 L238,148 Q232,148 232,140 Z" fill="#E5E5E5"/>
    <!-- Spray mist dots -->
    <circle cx="290" cy="88" r="2" fill="#93C5FD" opacity="0.4"/>
    <circle cx="298" cy="95" r="1.5" fill="#93C5FD" opacity="0.3"/>
    <circle cx="295" cy="82" r="1.5" fill="#93C5FD" opacity="0.3"/>
    <circle cx="302" cy="90" r="1" fill="#93C5FD" opacity="0.2"/>
    <circle cx="288" cy="78" r="1" fill="#93C5FD" opacity="0.25"/>
    <!-- Label -->
    <rect x="165" y="200" width="70" height="80" rx="6" fill="white" opacity="0.15"/>
    <rect x="175" y="220" width="50" height="8" rx="2" fill="white" opacity="0.25"/>
    <rect x="180" y="235" width="40" height="6" rx="2" fill="white" opacity="0.18"/>
  </g>
</svg>
