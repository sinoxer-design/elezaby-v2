    <rect x="-28" y="8" width="5" height="30" rx="2" fill="#7C3AED"/>
    <rect x="-18" y="8" width="5" height="34" rx="2" fill="#7C3AED"/>
    <rect x="-8" y="8" width="5" height="30" rx="2" fill="#7C3AED"/>
    <rect x="2" y="8" width="5" height="34" rx="2" fill="#7C3AED"/>
    <rect x="12" y="8" width="5" height="30" rx="2" fill="#7C3AED"/>
    <rect x="22" y="8" width="5" height="34" rx="2" fill="#7C3AED"/>
