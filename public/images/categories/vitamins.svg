<svg xmlns="http://www.w3.org/2000/svg" width="200" height="200" viewBox="0 0 200 200" fill="none">
  <circle cx="100" cy="100" r="90" fill="#D1FAE5"/>
  <circle cx="100" cy="100" r="78" fill="#6EE7B7" opacity="0.45"/>
  <!-- Large capsule (vertical, two-tone) -->
  <g transform="translate(100,100) rotate(-20)">
    <rect x="-16" y="-42" width="32" height="84" rx="16" fill="#10B981"/>
    <!-- Top half lighter -->
    <clipPath id="capsuleClip">
      <rect x="-16" y="-42" width="32" height="84" rx="16"/>
    </clipPath>
    <rect x="-16" y="-42" width="32" height="42" rx="0" fill="#34D399" clip-path="url(#capsuleClip)"/>
    <!-- Divider line -->
    <rect x="-16" y="-2" width="32" height="4" rx="1" fill="#D1FAE5" opacity="0.6"/>
  </g>
  <!-- Small round vitamin pill accent -->
  <circle cx="140" cy="135" r="10" fill="#059669" opacity="0.5"/>
  <circle cx="140" cy="135" r="6" fill="#34D399" opacity="0.6"/>
  <!-- Leaf accent -->
  <g transform="translate(62,62)">
    <ellipse cx="0" cy="0" rx="8" ry="14" fill="#059669" opacity="0.4" transform="rotate(-40)"/>
  </g>
</svg>
